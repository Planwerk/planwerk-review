name: CI

# On main (post-merge) only the coverage baseline is rebuilt; everything else
# already ran on the PR against identical code, so it is not run again. The test
# job is therefore the only job that triggers on push to main, and only its
# ubuntu leg (the one that uploads coverage to Codecov / the README badge).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # PRs run the full matrix; main runs ubuntu only, since that is the single
    # leg that uploads coverage to Codecov.
    strategy:
      matrix:
        os: ${{ github.event_name == 'pull_request' && fromJSON('["ubuntu-latest", "macos-latest"]') || fromJSON('["ubuntu-latest"]') }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test -race -coverprofile=cover.out ./...
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          files: ./cover.out
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go build ./cmd/planwerk-agent/

  fuzz:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test -run=^$ -fuzz=FuzzParseDiff -fuzztime=30s ./internal/github/
      - run: go test -run=^$ -fuzz=FuzzParse -fuzztime=30s ./internal/patterns/
      - run: go test -run=^$ -fuzz=FuzzStripMarkdownFences -fuzztime=30s ./internal/claude/

  vet:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...

  govulncheck:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod

  gosec:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # G204/G304/G122 are inherent to this tool: it orchestrates git/gh/claude
      # subprocesses and reads files from user-specified repositories.
      - uses: securego/gosec@v2.25.0
        # The gosec image pins GOTOOLCHAIN=local with a Go that can lag behind
        # our go.mod toolchain; allow it to fetch the version go.mod requires.
        env:
          GOTOOLCHAIN: auto
        with:
          args: -exclude=G204,G304,G122 ./...
