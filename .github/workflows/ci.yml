name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test -race -coverprofile=cover.out ./...
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          files: ./cover.out
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go build ./cmd/planwerk-review/

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test -run=^$ -fuzz=FuzzParseDiff -fuzztime=30s ./internal/github/
      - run: go test -run=^$ -fuzz=FuzzParse -fuzztime=30s ./internal/patterns/
      - run: go test -run=^$ -fuzz=FuzzStripMarkdownFences -fuzztime=30s ./internal/claude/

  vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod

  gosec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # G204/G304/G122 are inherent to this tool: it orchestrates git/gh/claude
      # subprocesses and reads files from user-specified repositories.
      - uses: securego/gosec@v2.25.0
        with:
          args: -exclude=G204,G304,G122 ./...
