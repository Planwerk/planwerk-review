version: 2

before:
  hooks:
    - go mod tidy
    - mkdir -p completions docs/man
    - sh -c "go run ./cmd/planwerk-agent completion bash > completions/planwerk-agent.bash"
    - sh -c "go run ./cmd/planwerk-agent completion zsh > completions/_planwerk-agent"
    - sh -c "go run ./cmd/planwerk-agent completion fish > completions/planwerk-agent.fish"
    - go run ./cmd/planwerk-agent gen-man-pages docs/man

builds:
  - main: ./cmd/planwerk-agent
    binary: planwerk-agent
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md
      - completions/*
      - docs/man/*.1

brews:
  - repository:
      owner: planwerk
      name: homebrew-tap
    homepage: "https://github.com/planwerk/planwerk-agent"
    description: "AI-powered code review for GitHub Pull Requests"
    license: "MIT"
    install: |
      bin.install "planwerk-agent"
      bash_completion.install "completions/planwerk-agent.bash" => "planwerk-agent"
      zsh_completion.install "completions/_planwerk-agent"
      fish_completion.install "completions/planwerk-agent.fish"
      man1.install Dir["docs/man/*.1"]

nfpms:
  - id: packages
    package_name: planwerk-agent
    vendor: planwerk
    homepage: "https://github.com/planwerk/planwerk-agent"
    maintainer: "planwerk <noreply@planwerk.dev>"
    description: "AI-powered code review for GitHub Pull Requests"
    license: MIT
    formats:
      - deb
      - rpm
    contents:
      - src: completions/planwerk-agent.bash
        dst: /usr/share/bash-completion/completions/planwerk-agent
        file_info:
          mode: 0644
      - src: completions/_planwerk-agent
        dst: /usr/share/zsh/site-functions/_planwerk-agent
        file_info:
          mode: 0644
      - src: completions/planwerk-agent.fish
        dst: /usr/share/fish/vendor_completions.d/planwerk-agent.fish
        file_info:
          mode: 0644
      - src: docs/man/*.1
        dst: /usr/share/man/man1/
        file_info:
          mode: 0644

sboms:
  - artifacts: archive
    cmd: syft
    args: ["${artifact}", "--output", "spdx-json=${document}"]

signs:
  - cmd: cosign
    artifacts: checksum
    output: true

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
